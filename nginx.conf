user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Upstream backend servers (10x API instances)
    upstream api_backend {
        least_conn;

        server api-1:8002 max_fails=3 fail_timeout=30s;
        server api-2:8002 max_fails=3 fail_timeout=30s;
        server api-3:8002 max_fails=3 fail_timeout=30s;
        server api-4:8002 max_fails=3 fail_timeout=30s;
        server api-5:8002 max_fails=3 fail_timeout=30s;
        server api-6:8002 max_fails=3 fail_timeout=30s;
        server api-7:8002 max_fails=3 fail_timeout=30s;
        server api-8:8002 max_fails=3 fail_timeout=30s;
        server api-9:8002 max_fails=3 fail_timeout=30s;
        server api-10:8002 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        location /predict/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
