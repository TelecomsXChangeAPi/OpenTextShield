version: '3.8'

services:
  # 10 API Server instances
  api-1:
    build: .
    ports:
      - "9001:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-2:
    build: .
    ports:
      - "9002:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-3:
    build: .
    ports:
      - "9003:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-4:
    build: .
    ports:
      - "9004:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-5:
    build: .
    ports:
      - "9005:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-6:
    build: .
    ports:
      - "9006:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-7:
    build: .
    ports:
      - "9007:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-8:
    build: .
    ports:
      - "9008:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-9:
    build: .
    ports:
      - "9009:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  api-10:
    build: .
    ports:
      - "9010:8002"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src

  # Nginx Load Balancer
  load-balancer:
    image: nginx:latest
    ports:
      - "8002:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3
      - api-4
      - api-5
      - api-6
      - api-7
      - api-8
      - api-9
      - api-10
